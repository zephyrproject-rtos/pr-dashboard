      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"

      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,700;1,400&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
      rel="stylesheet" />
    <script
      type="text/javascript"
      charset="utf8"
      src="https://cdn.datatables.net/2.1.8/js/dataTables.min.js"></script>
    <script
      type="text/javascript"
      charset="utf8"
      src="https://cdn.datatables.net/2.1.8/js/dataTables.jqueryui.min.js"></script>

    <script
      type="text/javascript"
      charset="utf8"
      src="https://cdn.datatables.net/responsive/3.0.3/js/dataTables.responsive.min.js"></script>
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.datatables.net/responsive/3.0.3/css/responsive.dataTables.min.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.8.1/font/bootstrap-icons.min.css" />

    <link rel="stylesheet" type="text/css" href="style.css" />

    <script type="text/javascript">
      (() => {
        const getPreferredTheme = () => {
          return window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        };

        const setTheme = (theme) => {
          document.documentElement.setAttribute("data-bs-theme", theme);
        };

        setTheme(getPreferredTheme());
        window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", () => {
          setTheme(getPreferredTheme());
        });
      })();

      let metadata = null;
      let prs = null;
      let lastDatasetUpdate = null;
      let selectedUsers = []; // Currently selected usernames for filtering
      let users = {}; // User stats loaded from users.json

      // Store array of usernames in localStorage
      function saveSelectedUsers(usernames) {
        localStorage.setItem("gh_users", JSON.stringify(usernames));
      }

      // Load array of usernames from localStorage
      function loadSelectedUsers() {
        const saved = localStorage.getItem("gh_users");
        if (saved) {
          try {
            return JSON.parse(saved);
          } catch (e) {
            console.error("Failed to parse saved users", e);
            return [];
          }
        }
        return [];
      }

      function populateAutocomplete(users, excludeList = []) {
        const datalist = document.getElementById("usernames");
        datalist.innerHTML = "";
        Object.keys(users)
          .filter((username) => !excludeList.includes(username))
          .sort((a, b) => a.toLowerCase().localeCompare(b.toLowerCase()))
          .forEach((username) => {
            const option = document.createElement("option");
            option.value = username;
            datalist.appendChild(option);
          });
      }

      function timeSince(timestamp) {
        const then = moment(timestamp);
        return then.fromNow();
      }

      function approvedCount(count) {
        linkClass = count ? "approved" : "none";
        return `<span class="${linkClass}">${count}</span>`;
      }

      function blockedCount(count) {
        linkClass = count ? "blocked" : "none";
        return `<span class="${linkClass}">${count}</span>`;
      }

      function prLink(repo, pr, text) {
        return `<a href="https://github.com/${metadata.org}/${repo}/pull/${pr}">${text}</a>`;
      }

      function userLink(user, internal = true) {
        let linkClass = "";
        if (user.startsWith("+")) {
          linkClass = "approved";
          user = user.substring(1);
        }
        if (user.startsWith("-")) {
          linkClass = "blocked";
          user = user.substring(1);
        }

        const href = internal ? `?username=${user}` : `https://github.com/${user}`;
        return `<a class="${linkClass}" href="${href}">${user}</a>`;
      }
      function sortUsernames(a, b) {
        const getPriority = (str) => (str.startsWith("-") ? -2 : str.startsWith("+") ? -1 : 0);
        const priorityA = getPriority(a);
        const priorityB = getPriority(b);
        return priorityA === priorityB ? a.localeCompare(b) : priorityA - priorityB;
      }

      function createDataTable(id, caption) {
        new DataTable($(`#${id}`), {
          columns: [
            {
              title: "PR",
              responsivePriority: 100,
              type: "string",
              render: (data, type, row) => {
                if (type == "display") {
                  let docHref = metadata.doc_url.replaceAll('\${pr}', row[0]);
                  docLink = `<a href="${docHref}" target="_blank" title="CI-built documentation">
                               <i class="bi bi-file-earmark-text"></i>
                             </a>`;
                  return docLink + " " + prLink(row[13], data, data);
                } else {
                  return data;
                }
              },
            },
            {
              title: "Title",
              className: "ellipsis wide",
              responsivePriority: 2,
              render: (data, type, row) => {
                if (type == "display") {
                  const link = prLink(row[13], row[0], data);
                  // add orange "R" badge if rebasing is needed, and a red "CI" badge if CI fails
                  let badges = "";
                  if (!row[8] || row[9]) {
                    // broken CI is red, pending CI is blue
                    badge_color = row[9] ? "info" : "danger";
                    badges += `<span class="badge bg-${badge_color}" title="CI failed / pending">CI</span> `;
                  }
                  if (row[10]) {
                    badges += `<span class="badge bg-warning text-dark" title="Rebase needed">R</span> `;
                  }
                  if (row[11]) {
                    badges = `<span class="badge bg-secondary" title="Unknown status">?</span> `;
                  }
                  if (row[12]) {
                    badges += `<span class="badge bg-success" title="Trivial">T</span> `;
                  }

                  return badges + link;
                }
                return data;
              },
            },
            {
              title: "Author",
              render: (data, type, row) => (type == "display" ? userLink(data) : data),
              responsivePriority: 3,
            },
            {
              title: "Assignee",
              render: (data, type, row) =>
                type == "display"
                  ? data
                      .sort(sortUsernames)
                      .map((user) => userLink(user))
                      .join(", ")
                  : data,
              responsivePriority: 4,
            },
            {
              title: "Reviewers",
              render: (data, type, row) =>
                type == "display"
                  ? data
                      .sort(sortUsernames)
                      .map((user) => userLink(user))
                      .join(", ")
                  : data,
              className: "ellipsis narrow",
              responsivePriority: 5,
            },
            { title: "Base", responsivePriority: 200 },
            {
              title: "Updated",
              render: (data, type, row) => (type == "display" ? timeSince(data) : data),
              responsivePriority: 6,
            },
            { title: "Status", visible: false },
            { title: "CI Passes", visible: false },
            { title: "Rebase needed", visible: false },
            { title: "Unknown mergeable status", visible: false },
            { title: "Trivial", visible: false },
            { title: "Repo", visible: false },
          ],
          order: [[6, "desc"]], // Show most recently updated PRs first
          paging: false,
          info: false,
          responsive: {
            details: false,
          },
          stateSave: true,
          createdRow: function (row, data, index) {
            if (data[7] === true) {
              $(row).addClass("draft");
            }
          },
        }).caption(caption);
      }

      function appendData(values, tableId) {
        const dataTable = $(`#${tableId}`).DataTable();
        dataTable.clear();

        for (const key of values.sort().reverse()) {
          const prData = prs[key];
          const repo = key.split("/")[0];
          const pr = key.split("/")[1];
          const row = [
            pr,
            prData.title,
            prData.author,
            prData.assignee_names,
            prData.reviewer_names,
            `${repo}/${prData.base}`,
            prData.updated_at,
            prData.draft,
            prData.ci_passes,
            prData.ci_pending,
            prData.needs_rebase,
            prData.unknown_mergeable_status,
            prData.trivial,
            repo,
          ];

          dataTable.row.add(row);
        }
        dataTable.columns.adjust().draw().responsive.recalc();
        oldCaption = dataTable.caption().split(" (")[0];
        dataTable.caption(oldCaption + ` (${dataTable.rows().count()})`);
      }

      function appendUser(values) {
        appendData(values.author, "author");
        appendData(values.blocking, "requested_changes");
        appendData(values.assignee, "assignee");
        appendData(values.reviewer, "reviewer");
        appendData(values.approved, "approved");
        appendData(values.previously_approved, "previously_approved");
        appendData(values.commented, "commented");

        // find all unassigned manifest repo PRs needing attention
        const unassigned = Object.keys(prs).filter((key) => {
          const prData = prs[key];
          const repo = key.split("/")[0];
          const pr = key.split("/")[1];
          if (repo !== metadata.manifest_repo) {
            return false;
          }
          return prData.assignee_names.length === 0 && !prData.draft;
        });
        appendData(unassigned, "unassigned");

        // find all manifest repo PRs were only the assignee has approved (and no one else) and where no
        // one as blocked, or PRs with only one approval where author is one of the assignees
        const missingOneApproval = Object.keys(prs).filter((key) => {
          const prData = prs[key];
          const repo = key.split("/")[0];
          const pr = key.split("/")[1];
          if (repo !== metadata.manifest_repo) {
            return false;
          }
          const assigneeIsAuthor = prData.assignee_names.includes(prData.author);
          if (assigneeIsAuthor) {
            return prData.approved === 1 && prData.blocked === 0;
          } else {
            return prData.assignee_approved === 1 && prData.blocked === 0 && prData.approved === 0;
          }
        });
        appendData(missingOneApproval, "missing_one_approval");
      }

      function mergeUserStats(usernames, usersData) {
        const statKeys = [
          "author",
          "blocking",
          "assignee",
          "reviewer",
          "approved",
          "previously_approved",
          "commented",
        ];
        const mergedStats = Object.fromEntries(
          statKeys.map((key) => [key, new Set()])
        );

        // Aggregate PRs from all selected users
        for (const username of usernames) {
          const userStats = usersData[username];
          if (!userStats) continue;

          // Add this user's PRs to each stat category
          for (const key of statKeys) {
            const prList = userStats[key];
            if (prList?.length) {
              prList.forEach((pr) => mergedStats[key].add(pr));
            }
          }
        }

        // Convert deduped sets back to arrays
        return Object.fromEntries(
          statKeys.map((key) => [key, Array.from(mergedStats[key])])
        );
      }

      function processData(data) {
        prs = data[0];
        users = data[1];

        if (selectedUsers.length > 0) {
          const merged = mergeUserStats(selectedUsers, users);
          appendUser(merged);
        }
        populateAutocomplete(users, selectedUsers);

        const leaderboard = $("#leaderboard").DataTable();
        leaderboard.clear();
        Object.entries(users).forEach(([username, stats]) => {
          leaderboard.row.add([
            userLink(username),
            stats.author.length,
            stats.assignee.length,
            stats.approved.length,
            stats.blocking.length,
          ]);
        });
        leaderboard.columns.adjust().draw().responsive.recalc();
      }

      function updateUserChips() {
        // Maximum number of visible chips before collapsing into "+N more" popover
        const maxVisibleChips = 3;
        const visible = selectedUsers.slice(0, maxVisibleChips);
        const hidden = selectedUsers.slice(maxVisibleChips);

        // Clear existing chips and repopulate
        const $container = $("#gh-username-chips");
        $container.empty();

        visible.forEach((username) => {
          $container.append(
            $(`<span class="gh-username-chip">
                <span>${username}</span>
                <button type="button" class="gh-username-chip-remove"
                        data-user="${username}" aria-label="Remove ${username}">
                  <i class="bi bi-x"></i>
                </button>
              </span>`)
          );
        });

        if (hidden.length > 0) {
          const hiddenHtml = hidden
            .map(
              (u) =>
                `<span class="gh-username-chip">
                  <span>${u}</span>
                  <button type="button" class="gh-username-chip-remove"
                          data-user="${u}" aria-label="Remove ${u}">
                    <i class="bi bi-x"></i>
                  </button>
                </span>`
            )
            .join("");

          const $moreBtn = $(
            `<button type="button" class="gh-more-chip"
                     data-bs-toggle="popover" data-bs-html="true"
                     title="More users" aria-label="Show ${hidden.length} more users">
              +${hidden.length} more
            </button>`
          );
          $container.append($moreBtn);

          new bootstrap.Popover($moreBtn[0], {
            content: `<div class="d-flex flex-wrap gap-2">${hiddenHtml}</div>`,
            html: true,
            sanitize: false,
            trigger: "focus"
          });
        }

        // Show/hide clear button based on selected users
        $("#gh-clear-users").toggleClass("d-none", selectedUsers.length === 0);

        // Update autocomplete to exclude selected users
        populateAutocomplete(users, selectedUsers);
      }

      function addUser(username) {
        if (!users[username]) {
          return false;
        }
        if (!selectedUsers.includes(username)) {
          selectedUsers.push(username);
          updateUserChips();
          updateURL();
        }
        return true;
      }

      function removeUser(username) {
        selectedUsers = selectedUsers.filter((u) => u !== username);
        updateUserChips();
        updateURL(selectedUsers.length === 0);
      }

      function updateURL(forceClear = false) {
        if (selectedUsers.length > 0) {
          const userQuery = selectedUsers.join(",");
          saveSelectedUsers(selectedUsers);
          window.location.href = `?username=${userQuery}`;
        } else if (forceClear) {
          saveSelectedUsers([]);
          window.location.href = `?`;
        }
      }

      function refreshData() {
        const tsQueryParam = `?ts=${new Date().getTime()}`;
        const urls = ["prs.json", "users.json"].map((url) => `${url}${tsQueryParam}`);

        // basic HEAD request on prs.json to get last modified date
        fetch(`prs.json${tsQueryParam}`, { method: "HEAD" }).then((res) => {
          d = new Date(res.headers.get("last-modified"));
          document.getElementById("last_update").textContent = `Last update: ${moment(
            d
          ).fromNow()}`;

          if (lastDatasetUpdate === null || moment(d).isAfter(lastDatasetUpdate)) {
            const spinner = document.getElementById("spinner-overlay");
            spinner.classList.replace("d-none", "d-flex");
            Promise.all(urls.map((url) => fetch(url).then((res) => res.json())))
              .then((data) => {
                lastDatasetUpdate = d;
                processData(data);
              })
              .catch((error) => {
                console.error("Error refreshing data:", error);
              })
              .finally(() => {
                spinner.classList.replace("d-flex", "d-none");
              });
          } else {
            // raw data hasn't changed but redraw table to update "since" columns
            $(".prs").DataTable().rows().invalidate().draw();
          }
        });
      }

      function handleUserRemoval(e) {
        const $button = $(e.target).closest(".gh-username-chip-remove");
        if ($button.length === 0) return false;
        e.preventDefault();
        const username = $button.data("user");
        if (username) removeUser(username);
        return true;
      }

      function handleUserClearAll(e) {
        const $clearBtn = $(e.target).closest("#gh-clear-users");
        if ($clearBtn.length === 0) return false;
        e.preventDefault();
        selectedUsers = [];
        updateUserChips();
        updateURL(true);
        return true;
      }

      // Delegate click handlers
      $(document).on("click", (e) => {
        if (handleUserRemoval(e)) return;
        if (handleUserClearAll(e)) return;
      });

      function initTable() {
        const tableConfigs = [
          { id: "author", caption: "Authored" },
          { id: "requested_changes", caption: "Requested changes" },
          { id: "assignee", caption: "Assigned" },
          { id: "reviewer", caption: "Reviewer" },
          { id: "approved", caption: "Approved" },
          { id: "previously_approved", caption: "Previously Approved" },
          { id: "commented", caption: "Commented" },
          { id: "unassigned", caption: `Unassigned [${metadata.manifest_repo} repo only]` },
          { id: "missing_one_approval", caption: `Needs 1 More Approval [${metadata.manifest_repo} repo only]` },
        ];

        tableConfigs.forEach((config) => {
          createDataTable(config.id, config.caption);
        });

        // create Leaderboard table (user - assigned PRs - approved PRs - blocked PRs)
        new DataTable($("#leaderboard"), {
          columns: [
            { title: "User", responsivePriority: 1 },
            { title: "Authored", responsivePriority: 2 },
            { title: "Assigned", responsivePriority: 3 },
            { title: "Approved", responsivePriority: 4 },
            { title: "Requested changes", responsivePriority: 5 },
          ],
          paging: true,
          info: false,
          responsive: {
            details: false,
          },
          order: [[2, "desc"]], // default sort is assigned-desc
          stateSave: true,
          lengthChange: false,
          pageLength: 20,
        }).caption("<i class='bi-trophy'></i> Leaderboard");

        const ghUsernameInput = document.getElementById("gh-username-input");
        const urlParams = new URLSearchParams(window.location.search);
        const usernameParam = urlParams.get("username");

        if (usernameParam) {
          selectedUsers = usernameParam
            .split(",")
            .map(u => u.trim())
            .filter(u => u);
          saveSelectedUsers(selectedUsers);
        } else {
          const savedUsers = loadSelectedUsers();
          if (savedUsers.length > 0) {
            selectedUsers = savedUsers;
            updateURL();
            return; // Exit early since updateURL() reloads the page
          }
        }

        updateUserChips();
        ghUsernameInput.placeholder = "Enter GitHub username";

        // ENTER key pressed or Backspace on empty to remove last
        ghUsernameInput.addEventListener("keydown", (event) => {
          if (event.key === "Enter") {
            event.preventDefault();
            const username = ghUsernameInput.value.trim();
            if (username) {
              if (addUser(username)) {
                ghUsernameInput.value = "";
              } else {
                ghUsernameInput.classList.add("is-invalid");
                setTimeout(() => ghUsernameInput.classList.remove("is-invalid"), 1500);
              }
            }
          }

          if (event.key === "Backspace" &&
              ghUsernameInput.value === "" &&
              selectedUsers.length) {
            event.preventDefault();
            removeUser(selectedUsers[selectedUsers.length - 1]);
          }
        });

        // autocomplete entry selection
        ghUsernameInput.addEventListener("change", () => {
          const username = ghUsernameInput.value.trim();
          if (username && users[username]) {
            if (addUser(username)) {
              ghUsernameInput.value = "";
            }
          }
        });

        refreshData();
        setInterval(refreshData, 10000);
      }

      window.addEventListener("load", () => {
        fetch("metadata.json").then((res) => res.json()).then((data) => {
          metadata = data;
          initTable();
          })
          .catch((err) => {
            console.error("Error fetching metadata:", err);
          });
      });
    </script>
  </head>

  <body>
    <div
      id="spinner-overlay"
      class="position-fixed d-flex z-3 top-0 start-0 w-100 h-100 justify-content-center align-items-center bg-body bg-opacity-75">
      <div class="spinner-border text-primary" role="status"></div>
    </div>
    <nav id="navbar" class="navbar bg-body-tertiary px-3 mb-3 sticky-top">
      <div class="container-fluid gap-2">
        <form class="d-flex gap-2">
          <div class="gh-username-container">
            <span id="gh-username-chips"></span>
            <input
              class="form-controls"
              id="gh-username-input"
              type="text"
              placeholder="Enter GitHub username"
              autocomplete="off"
              list="usernames" />
            <button
              type="button"
              id="gh-clear-users"
              class="gh-clear-btn d-none"
              title="Clear all users">
              <i class="bi bi-x-lg"></i>
            </button>
          </div>
          <datalist id="usernames"></datalist>
        </form>
        <ul class="nav nav-pills flex-wrap">
          <li class="nav-item">
            <a class="nav-link" href="#author">Authored</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#requested_changes">Requested changes</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#assignee">Assigned</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#reviewer">Reviewer</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#approved">Approved</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#previously_approved">Previously Approved</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#commented">Commented</a>
          </li>
          <li class="nav-item dropdown">
            <a
              class="nav-link dropdown-toggle"
              data-bs-toggle="dropdown"
              href="#"
              role="button"
              aria-expanded="false"
              >More…</a
            >
            <ul class="dropdown-menu dropdown-menu-end">
              <li><a class="dropdown-item" href="#unassigned">Unassigned</a></li>
              <li>
                <a class="dropdown-item" href="#missing_one_approval">Needs 1 More Approval</a>
              </li>
              <li>
                <a class="dropdown-item" href="#leaderboard"
                  ><i class="bi bi-trophy"></i> Leaderboard</a
                >
              </li>
            </ul>
          </li>
        </ul>
      </div>
    </nav>

    <div
      data-bs-spy="scroll"
      data-bs-target="#navbar"
      data-bs-smooth-scroll="true"
      data-bs-root-margin="0px 0px -60%"
      data-bs-threshold="0,0.1"
      class="bg-body-tertiary p-3 rounded-2"
      id="scroll-area">
      <table id="author" class="table table-sm table-striped table-hover prs display"></table>
      <hr class="border border-primary border-3 opacity-25" />
      <table id="requested_changes" class="table table-sm table-striped table-hover prs display"></table>
      <hr class="border border-primary border-3 opacity-25" />
      <table id="assignee" class="table table-sm table-striped table-hover prs display"></table>
      <hr class="border border-primary border-3 opacity-25" />
      <table id="reviewer" class="table table-sm table-striped table-hover prs display"></table>
      <hr class="border border-primary border-3 opacity-25" />
      <table id="approved" class="table table-sm table-striped table-hover prs display"></table>
      <hr class="border border-primary border-3 opacity-25" />
      <table
        id="previously_approved"
        class="table table-sm table-striped table-hover prs display"></table>
      <hr class="border border-primary border-3 opacity-25" />
      <table id="commented" class="table table-sm table-striped table-hover prs display"></table>
      <hr class="border border-primary border-3 opacity-25" />
      <!-- Additional tables for various types of PRs that need attention -->
      <table id="unassigned" class="table table-sm table-striped table-hover prs display"></table>
      <hr class="border border-primary border-3 opacity-25" />
      <table
        id="missing_one_approval"
        class="table table-sm table-striped table-hover prs display"></table>
      <hr class="border border-primary border-3 opacity-25" />
      <!-- Leaderboard -->
